<!doctype html>
<html lang="cs" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#FFF8F2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rodinka" />
    <title>Rodinka</title>
    <script>
      (() => {
        try {
          const preference = localStorage.getItem('rodinka.themePreference');
          const safePreference = preference === 'light' || preference === 'dark' || preference === 'system' ? preference : 'system';
          const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = safePreference === 'system' ? (systemDark ? 'dark' : 'light') : safePreference;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#1E211C' : '#FFF8F2');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
